<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superkid — Дашборд ОП</title>
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --border: #2a2d3a;
            --text: #e4e4e7;
            --text-dim: #8b8d97;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --green: #22c55e;
            --green-bg: rgba(34,197,94,.12);
            --yellow: #eab308;
            --yellow-bg: rgba(234,179,8,.12);
            --red: #ef4444;
            --red-bg: rgba(239,68,68,.12);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header h1 span { color: var(--accent); }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--card);
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dim);
            transition: all .2s;
            border: none;
            background: none;
        }
        .tab:hover { color: var(--text); }
        .tab.active {
            background: var(--accent);
            color: #fff;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .filter-group {
            display: flex;
            gap: 4px;
            background: var(--card);
            padding: 4px;
            border-radius: 8px;
        }
        .filter-btn {
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-dim);
            border: none;
            background: none;
            transition: all .2s;
            white-space: nowrap;
        }
        .filter-btn:hover { color: var(--text); }
        .filter-btn.active { background: var(--accent); color: #fff; }

        .date-inputs {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .date-inputs input {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
        }
        .date-inputs input:focus { outline: none; border-color: var(--accent); }

        select {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }
        select:focus { outline: none; border-color: var(--accent); }

        /* Stats Table */
        .stats-card {
            background: var(--card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 24px;
        }
        .stats-card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }
        th {
            color: var(--text-dim);
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(99,102,241,.04); }

        .cr-cell { color: var(--accent); font-weight: 600; }

        /* Plan colors */
        .plan-green { color: var(--green); }
        .plan-yellow { color: var(--yellow); }
        .plan-red { color: var(--red); }
        .plan-green-bg { background: var(--green-bg) !important; }
        .plan-yellow-bg { background: var(--yellow-bg) !important; }
        .plan-red-bg { background: var(--red-bg) !important; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-green { background: var(--green-bg); color: var(--green); }
        .badge-yellow { background: var(--yellow-bg); color: var(--yellow); }
        .badge-red { background: var(--red-bg); color: var(--red); }

        /* Summary cards */
        .summary-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .summary-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
        }
        .summary-card .label {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }
        .summary-card .value {
            font-size: 24px;
            font-weight: 700;
        }
        .summary-card .sub {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Section title */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            margin-top: 8px;
        }

        /* Salary section */
        .salary-filters {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        /* Hide sections */
        .section { display: none; }
        .section.active { display: block; }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 12px; }
            .summary-row { grid-template-columns: repeat(2, 1fr); }
            th, td { padding: 8px 10px; font-size: 12px; }
            .filters { gap: 8px; }
        }

        .currency { font-variant-numeric: tabular-nums; }
        .plan-table td.metric-name { font-weight: 500; }

        /* Funnel visual cards */
        .funnel-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }
        .funnel-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 12px;
            position: relative;
            overflow: hidden;
            min-width: 0;
        }
        .funnel-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }
        .funnel-card.fc-leads::before { background: #8b8d97; }
        .funnel-card.fc-worked::before { background: #a78bfa; }
        .funnel-card.fc-qual::before { background: #22c55e; }
        .funnel-card.fc-scheduled::before { background: #f97316; }
        .funnel-card.fc-attended::before { background: #ef4444; }
        .funnel-card.fc-paid::before { background: #22c55e; }
        .funnel-card.fc-revenue::before { background: #eab308; }

        .funnel-card .fc-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 8px;
        }
        .funnel-card .fc-value {
            font-size: 26px;
            font-weight: 700;
            white-space: nowrap;
        }
        .funnel-card.fc-revenue .fc-value {
            font-size: 20px;
        }
        .funnel-card .fc-sub {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* CR cards (inside funnel grid) */
        .cr-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
            min-width: 0;
        }
        .cr-card .cr-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 6px;
        }
        .cr-card .cr-value {
            font-size: 20px;
            font-weight: 700;
        }
        .cr-card .cr-value.clr-green { color: var(--green); }
        .cr-card .cr-value.clr-yellow { color: var(--yellow); }
        .cr-card .cr-value.clr-red { color: var(--red); }
        .cr-card .cr-value.clr-purple { color: #a78bfa; }
        .cr-card .cr-value.clr-orange { color: #f97316; }
        .cr-card .cr-value.clr-blue { color: #60a5fa; }

        /* Manager detail table */
        .mgr-detail-table {
            width: 100%;
            border-collapse: collapse;
        }
        .mgr-detail-table th {
            padding: 10px 12px;
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            font-weight: 500;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .mgr-detail-table th:first-child { text-align: left; }
        .mgr-detail-table td {
            padding: 12px 8px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        .mgr-detail-table td:first-child {
            text-align: left;
            font-weight: 700;
        }
        .mgr-detail-table tr:last-child td {
            border-bottom: none;
        }
        .mgr-detail-table tr.mgr-total td {
            border-top: 2px solid var(--border);
            color: var(--accent);
            font-weight: 700;
        }
        .mgr-detail-table .cr-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .mgr-detail-table .cr-badge.bg-green { background: var(--green-bg); color: var(--green); }
        .mgr-detail-table .cr-badge.bg-yellow { background: var(--yellow-bg); color: var(--yellow); }
        .mgr-detail-table .cr-badge.bg-red { background: var(--red-bg); color: var(--red); }

        @media (max-width: 1200px) {
            .funnel-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 768px) {
            .funnel-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* Plan inputs */
        .plan-input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 13px;
            width: 100px;
            text-align: right;
        }
        .plan-input::placeholder { color: #555; }
        .plan-input:focus { outline: none; border-color: var(--accent); }
        .plan-save-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .plan-save-btn:hover { background: var(--accent-hover); }

        /* Salary cards design */
        .sal-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .sal-summary-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .sal-summary-card .sal-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .sal-summary-card .sal-value {
            font-size: 28px;
            font-weight: 700;
        }
        .sal-summary-card .sal-sub {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
        }
        .sal-summary-card.accent-border {
            border-color: var(--accent);
        }

        .sal-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .sal-mgr-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }
        .sal-mgr-top {
            background: linear-gradient(135deg, rgba(34,197,94,.08), rgba(99,102,241,.06));
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sal-mgr-period {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .sal-mgr-name {
            font-size: 22px;
            font-weight: 700;
            margin-top: 2px;
        }
        .sal-mgr-earned {
            text-align: right;
        }
        .sal-mgr-earned-label {
            font-size: 11px;
            color: var(--text-dim);
        }
        .sal-mgr-earned-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--green);
        }

        .sal-kpi-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 16px 20px;
        }
        .sal-kpi-box {
            background: var(--bg);
            border-radius: 8px;
            padding: 12px;
        }
        .sal-kpi-title {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .sal-kpi-title span {
            color: var(--accent);
            font-weight: 600;
        }
        .sal-kpi-fact {
            font-size: 18px;
            font-weight: 700;
        }
        .sal-kpi-fact span {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 400;
        }
        .sal-kpi-plan {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }
        .sal-progress {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .sal-progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width .3s;
        }
        .sal-progress-fill.green { background: var(--green); }
        .sal-progress-fill.yellow { background: var(--yellow); }
        .sal-progress-fill.red { background: var(--red); }
        .sal-progress-fill.accent { background: var(--accent); }

        .sal-kpi-result {
            font-size: 12px;
            margin-top: 6px;
            font-weight: 500;
        }
        .sal-kpi-result .pct { color: var(--accent); }
        .sal-kpi-result .arrow { color: var(--text-dim); }
        .sal-kpi-result .amount { color: var(--green); }

        .sal-payout {
            padding: 0 20px 16px;
        }
        .sal-payout-title {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .sal-payout-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
        }
        .sal-payout-row.total {
            border-top: 1px solid var(--border);
            margin-top: 6px;
            padding-top: 10px;
            font-weight: 700;
            font-size: 15px;
        }
        .sal-payout-row.total .sal-payout-amount {
            color: var(--green);
        }
        .sal-payout-label { color: var(--text-dim); }
        .sal-payout-amount { font-weight: 600; font-variant-numeric: tabular-nums; }

        .sal-mgr-bottom {
            padding: 10px 20px;
            background: var(--bg);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-dim);
        }
        .sal-mgr-bottom .sal-bottom-progress {
            flex: 1;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        .sal-mgr-bottom .sal-bottom-pct {
            font-weight: 600;
        }


        .sal-period-btn.active {
            background: var(--green) !important;
            color: #fff !important;
        }
        .sal-total-btn {
            background: var(--card) !important;
            border: 1px solid var(--accent) !important;
            color: var(--accent) !important;
            padding: 6px 16px;
            border-radius: 6px;
            margin-left: auto;
        }
        .sal-total-btn.active {
            background: var(--accent) !important;
            color: #fff !important;
        }

        @media (max-width: 768px) {
            .sal-summary { grid-template-columns: repeat(2, 1fr); }
            .sal-cards { grid-template-columns: 1fr; }
        }

        /* Department tabs */
        .dept-tabs {
            display: flex;
            gap: 4px;
            background: var(--card);
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 16px;
        }
        .dept-tab {
            padding: 12px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-dim);
            transition: all .2s;
            border: none;
            background: none;
        }
        .dept-tab:hover { color: var(--text); }
        .dept-tab.active {
            background: var(--accent);
            color: #fff;
        }

        /* Sortable table headers */
        .sortable-th { cursor: pointer; user-select: none; white-space: nowrap; }
        .sortable-th:hover { color: var(--accent); }
        .sortable-th .sort-arrow { font-size: 10px; margin-left: 4px; opacity: 0.4; }
        .sortable-th.sort-active .sort-arrow { opacity: 1; color: var(--accent); }

        /* Recommendations */
        .rec-item { padding: 10px 14px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; line-height: 1.6; }
        .rec-good { background: var(--green-bg); border-left: 3px solid var(--green); }
        .rec-warn { background: var(--yellow-bg); border-left: 3px solid var(--yellow); }
        .rec-bad { background: var(--red-bg); border-left: 3px solid var(--red); }
        .rec-item strong { color: var(--text); }
        .rec-item .rec-label { font-weight: 600; margin-bottom: 2px; }

        /* Loading indicator */
        .loading-bar {
            height: 3px;
            background: var(--accent);
            border-radius: 2px;
            animation: loading 1.5s infinite;
            margin-bottom: 20px;
        }
        @keyframes loading {
            0% { width: 0; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span>Superkid</span></h1>
            <div style="display:flex;align-items:center;gap:12px">
                <div style="font-size:13px;color:var(--text-dim)" id="currentDate"></div>
                <button onclick="location.reload()" style="background:var(--card);border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px">Обновить</button>
            </div>
        </div>

        <!-- Department tabs -->
        <div class="dept-tabs">
            <button class="dept-tab active" data-dept="sales">Отдел продаж</button>
            <button class="dept-tab" data-dept="marketing">Отдел маркетинга</button>
        </div>

        <!-- =================== DEPARTMENT: SALES =================== -->
        <div id="dept-sales">

        <!-- Main tabs -->
        <div class="tabs" id="mainTabs">
            <button class="tab active" data-tab="statistics">Статистики</button>
            <button class="tab" data-tab="plans">Планы</button>
            <button class="tab" data-tab="salary">Зарплата</button>
        </div>

        <!-- =================== SECTION: STATISTICS =================== -->
        <div class="section active" id="section-statistics">
            <div class="filters">
                <div class="filter-group" id="dateFilters">
                    <button class="filter-btn" data-period="today">Сегодня</button>
                    <button class="filter-btn" data-period="yesterday">Вчера</button>
                    <button class="filter-btn" data-period="week">Неделя</button>
                    <button class="filter-btn active" data-period="month">Месяц</button>
                    <button class="filter-btn" data-period="custom">Период</button>
                </div>
                <div class="date-inputs" id="customDates" style="display:none">
                    <input type="date" id="dateFrom">
                    <span style="color:var(--text-dim)">—</span>
                    <input type="date" id="dateTo">
                    <button class="filter-btn" style="background:var(--accent);color:#fff" onclick="applyCustomDates()">ОК</button>
                </div>
                <select id="managerFilter">
                    <option value="all">Весь отдел</option>
                </select>
            </div>

            <!-- Funnel + CR combined grid -->
            <div class="funnel-grid" id="funnelGrid"></div>

            <!-- Manager detail table -->
            <div class="stats-card">
                <div class="stats-card-header">По менеджерам — детализация</div>
                <div style="overflow-x:auto">
                    <table class="mgr-detail-table" id="mgrDetailTable"></table>
                </div>
            </div>
        </div>

        <!-- =================== SECTION: PLANS =================== -->
        <div class="section" id="section-plans">
            <div class="filters">
                <select id="planMonthFilter"></select>
                <select id="planManagerFilter">
                    <option value="all">Весь отдел</option>
                </select>
            </div>

            <div class="stats-card">
                <div class="stats-card-header">
                    <span>Планы на месяц</span>
                </div>
                <div id="planEditor"></div>
            </div>

            <div class="stats-card" style="margin-top:16px">
                <div class="stats-card-header">Выполнение плана</div>
                <table>
                    <thead>
                        <tr>
                            <th>Показатель</th>
                            <th>План</th>
                            <th>Факт</th>
                            <th>%</th>
                            <th>Статус</th>
                        </tr>
                    </thead>
                    <tbody id="planTable"></tbody>
                </table>
            </div>
        </div>

        <!-- =================== SECTION: SALARY =================== -->
        <div class="section" id="section-salary">
            <div class="salary-filters">
                <div class="filter-group" id="salaryPeriodFilters">
                    <button class="filter-btn sal-period-btn active" data-period="first">Выплата 1 — 15 числа</button>

    <script>
    // ============================================================
    // GOOGLE SHEETS DATA LOADER
    // ============================================================
    const SHEET_ID = '1uhxGGcEWkcl_8jXDjs2R8rv6wUFhYmNOx4s4bn9UBto';
    const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:gvizCallback&gid=0`;

    let ALL_DEALS = [];
    let MANAGERS = [];

    // Parse date string "DD.MM.YYYY HH:MM" or "DD.MM.YYYY" → Date object
    function parseDateStr(str) {
        if (!str || str === 'None' || str === '') return null;
        str = String(str).trim();
        const parts = str.split(' ')[0].split('.');
        if (parts.length !== 3) return null;
        const d = parseInt(parts[0], 10);
        const m = parseInt(parts[1], 10) - 1;
        const y = parseInt(parts[2], 10);
        if (isNaN(d) || isNaN(m) || isNaN(y) || y < 2000) return null;
        return new Date(y, m, d);
    }

    function parseNumber(val) {
        if (val === null || val === undefined || val === '' || val === 'None') return 0;
        if (typeof val === 'number') return val;
        return parseFloat(String(val).replace(/\s/g, '').replace(',', '.')) || 0;
    }

    // Load via JSONP (bypasses CORS)
    function loadViaJSONP() {
        return new Promise((resolve, reject) => {
            window.gvizCallback = function(response) {
                delete window.gvizCallback;
                document.body.removeChild(script);
                if (response.status === 'error') {
                    reject(new Error(response.errors?.map(e => e.message).join(', ') || 'Unknown error'));
                    return;
                }
                resolve(response);
            };
            const script = document.createElement('script');
            script.src = GVIZ_URL;
            script.onerror = () => {
                delete window.gvizCallback;
                document.body.removeChild(script);
                reject(new Error('Script load failed'));
            };
            document.body.appendChild(script);
        });
    }

    // Get cell value — handles gviz Date objects and strings
    function cellVal(row, colIdx) {
        const cell = row.c[colIdx];
        if (!cell) return null;
        return cell.v;
    }

    // Get date from cell — gviz can return:
    // 1. Date objects (if executed as JS)
    // 2. Strings like "Date(2026,2,11,20,34,0)" (gviz internal format)
    // 3. Strings like "11.03.2026 20:34" (formatted or string columns)
    function cellDate(row, colIdx) {
        const cell = row.c[colIdx];
        if (!cell || cell.v === null || cell.v === undefined) return null;
        const v = cell.v;
        // Already a Date object
        if (v instanceof Date) return new Date(v.getFullYear(), v.getMonth(), v.getDate());
        if (typeof v === 'string') {
            // gviz "Date(YYYY,M,D,...)" format (month is 0-indexed)
            const dvMatch = v.match(/^Date\((\d+),(\d+),(\d+)/);
            if (dvMatch) {
                return new Date(parseInt(dvMatch[1]), parseInt(dvMatch[2]), parseInt(dvMatch[3]));
            }
            // "DD.MM.YYYY" format
            return parseDateStr(v);
        }
        // Fallback: formatted value
        if (cell.f) return parseDateStr(cell.f);
        return null;
    }

    async function loadDeals() {
        const response = await loadViaJSONP();
        const table = response.table;
        const dataRows = table.rows;
        if (!dataRows || dataRows.length === 0) return;

        // Column indices (0-based):
        // 3=Ответственный, 9=Дата создания, 10=Дата ВР, 11=Дата Квала
        // 12=Дата назначения ОУ, 13=Дата проведения ОУ, 14=Дата Выставления счета
        // 15=Дата предоплаты (STRING), 16=Дата оплаты (STRING)
        // 20=Бюджет (NUMBER), 21=Сумма предоплаты (STRING)
        const deals = [];
        const managerSet = new Set();

        for (let i = 0; i < dataRows.length; i++) {
            const r = dataRows[i];
            if (!r || !r.c) continue;

            const manager = cellVal(r, 3) || 'Неизвестно';
            managerSet.add(manager);

            const dateCreated = cellDate(r, 9);
            const rawWorked = cellDate(r, 10);
            const rawQual = cellDate(r, 11);
            const dateScheduledOU = cellDate(r, 12);
            const dateAttendedOU = cellDate(r, 13);
            const dateInvoiced = cellDate(r, 14);
            const rawPrepay = cellDate(r, 15);       // string column
            const closedAt = cellDate(r, 17);         // datetime column
            const status = cellVal(r, 28) || '';       // Сделка.Статус

            // Business logic for fallback dates:
            // Дата ВР: K, fallback L, fallback M
            const dateWorked = rawWorked || rawQual || dateScheduledOU;
            // Дата Квала: L, fallback M
            const dateQualified = rawQual || dateScheduledOU;

            // Дата оплаты:
            // 1) Если есть Дата предоплаты (col 15) → используем её
            // 2) Если статус = "Детская прямая / Успешно реализовано" → используем closed_at (col 17)
            let paymentDate = null;
            const isRealized = status.toLowerCase().includes('успешно реализовано');
            if (rawPrepay) {
                paymentDate = rawPrepay;
            } else if (isRealized && closedAt) {
                paymentDate = closedAt;
            }

            const budget = parseNumber(cellVal(r, 20));
            const prepayAmount = parseNumber(cellVal(r, 21));

            deals.push({
                id: cellVal(r, 0),
                manager,
                dateCreated,
                dateWorked,
                dateQualified,
                dateScheduledOU,
                dateAttendedOU,
                dateInvoiced,
                datePrepay: rawPrepay,
                isRealized,
                paymentDate,          // resolved payment date
                budget,
                prepayAmount,
                status,
            });
        }

        ALL_DEALS = deals;
        // Exclude system/admin accounts from managers
        const EXCLUDED_MANAGERS = ['askar_akhmadeev@mail.ru'];
        MANAGERS = [...managerSet].filter(m => !EXCLUDED_MANAGERS.includes(m)).sort();
    }

    // ============================================================
    // PLANS — stored in localStorage per manager per month
    // ============================================================
    // Plan key format: "plan_YYYY-MM" or "plan_YYYY-MM_ManagerName"
    function getPlanKey(yearMonth, manager) {
        if (manager && manager !== 'all') return `superkid_plan_${yearMonth}_${manager}`;
        return `superkid_plan_${yearMonth}_all`;
    }

    function getDefaultPlan() {
        return {
            revenue: 0,
            attendedOU: 0,
            kpiBonus: 0,
            fixedSalary: 1500000,
            reglaments: 1000000,
        };
    }

    function loadPlan(yearMonth, manager) {
        const key = getPlanKey(yearMonth, manager);
        const saved = localStorage.getItem(key);
        if (saved) {
            try { return { ...getDefaultPlan(), ...JSON.parse(saved) }; } catch(e) {}
        }
        return getDefaultPlan();
    }

    function savePlan(yearMonth, manager, plan) {
        const key = getPlanKey(yearMonth, manager);
        localStorage.setItem(key, JSON.stringify(plan));
    }

    // Get plan for a manager for a specific month (YYYY-MM string)
    function getManagerMonthlyPlan(yearMonth, manager) {
        if (manager === 'all') {
            // Sum all manager plans
            const total = getDefaultPlan();
            MANAGERS.forEach(m => {
                const p = loadPlan(yearMonth, m);
                Object.keys(total).forEach(k => total[k] += p[k]);
            });
            return total;
        }
        return loadPlan(yearMonth, manager);
    }

    // Prorate plan to a date range within a month
    function getPlanForPeriod(manager, from, to) {
        const ym = from.getFullYear() + '-' + String(from.getMonth() + 1).padStart(2, '0');
        const monthly = getManagerMonthlyPlan(ym, manager);
        const daysInMonth = new Date(from.getFullYear(), from.getMonth() + 1, 0).getDate();
        const daysInRange = getDaysInRange(from, to);
        const ratio = daysInRange / daysInMonth;

        return {
            revenue: Math.round(monthly.revenue * ratio),
            attendedOU: Math.round(monthly.attendedOU * ratio),
            kpiBonus: monthly.kpiBonus, // not prorated
        };
    }

    // ============================================================
    // UTILITY
    // ============================================================
    function fmt(d) { return d.toISOString().slice(0,10); }
    function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }

    // ============================================================
    // STATE
    // ============================================================
    let state = {
        activeTab: 'statistics',
        datePeriod: 'month',
        customFrom: null,
        customTo: null,
        manager: 'all',
        planMonth: null, // 'YYYY-MM'
        planManager: 'all',
        salaryMonth: new Date().getMonth(),
        salaryYear: new Date().getFullYear(),
        salaryPeriod: 'first',
    };

    // ============================================================
    // DATE UTILS
    // ============================================================
    function getToday() {
        const d = new Date();
        return new Date(d.getFullYear(), d.getMonth(), d.getDate());
    }

    function getDateRange(period, customFrom, customTo) {
        const today = getToday();
        switch (period) {
            case 'today':
                return [today, today];
            case 'yesterday': {
                const y = addDays(today, -1);
                return [y, y];
            }
            case 'week': {
                const day = today.getDay();
                const diff = day === 0 ? 6 : day - 1;
                const monday = addDays(today, -diff);
                const sunday = addDays(monday, 6);
                return [monday, sunday];
            }
            case 'month':
                return [new Date(today.getFullYear(), today.getMonth(), 1),
                        new Date(today.getFullYear(), today.getMonth() + 1, 0)];
            case 'custom': {
                // Parse YYYY-MM-DD strings into local dates (avoid UTC issues)
                let f = today, t = today;
                if (customFrom) {
                    const p = customFrom.split('-').map(Number);
                    f = new Date(p[0], p[1] - 1, p[2]);
                }
                if (customTo) {
                    const p = customTo.split('-').map(Number);
                    t = new Date(p[0], p[1] - 1, p[2]);
                }
                return [f, t];
            }
            default:
                return [today, today];
        }
    }

    function inRange(date, from, to) {
        if (!date) return false;
        const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const f = new Date(from.getFullYear(), from.getMonth(), from.getDate());
        const t = new Date(to.getFullYear(), to.getMonth(), to.getDate());
        return d >= f && d <= t;
    }

    function getDaysInRange(from, to) {
        return Math.max(1, Math.round((to - from) / 86400000) + 1);
    }

    // ============================================================
    // REVENUE CALCULATION
    // ============================================================
    // Если paymentDate попадает в период:
    // - Успешно реализовано → бюджет (U), не суммируя предоплату
    // - Иначе (предоплата) → сумма предоплаты (V)
    function getRevenue(deal, from, to) {
        if (!deal.paymentDate || !inRange(deal.paymentDate, from, to)) return 0;
        if (deal.isRealized) return deal.budget || 0;
        return deal.prepayAmount || 0;
    }

    // ============================================================
    // COMPUTE STATS
    // ============================================================
    function computeStats(manager, from, to) {
        let deals = ALL_DEALS;
        if (manager !== 'all') {
            deals = deals.filter(d => d.manager === manager);
        }

        const newLeads = deals.filter(d => inRange(d.dateCreated, from, to)).length;
        const leadsWorked = deals.filter(d => inRange(d.dateWorked, from, to)).length;
        const qualLeads = deals.filter(d => inRange(d.dateQualified, from, to)).length;
        const scheduledOU = deals.filter(d => inRange(d.dateScheduledOU, from, to)).length;
        const attendedOU = deals.filter(d => inRange(d.dateAttendedOU, from, to)).length;
        const invoiced = deals.filter(d => inRange(d.dateInvoiced, from, to)).length;
        const payments = deals.filter(d => inRange(d.paymentDate, from, to)).length;

        let revenue = 0;
        deals.forEach(d => { revenue += getRevenue(d, from, to); });

        const crLeadWorked = newLeads > 0 ? (leadsWorked / newLeads * 100) : 0;
        const crWorkedQual = leadsWorked > 0 ? (qualLeads / leadsWorked * 100) : 0;
        const crLeadQual = newLeads > 0 ? (qualLeads / newLeads * 100) : 0;
        const crQualScheduled = qualLeads > 0 ? (scheduledOU / qualLeads * 100) : 0;
        const crScheduledAttended = scheduledOU > 0 ? (attendedOU / scheduledOU * 100) : 0;
        const crAttendedPaid = attendedOU > 0 ? (payments / attendedOU * 100) : 0;
        const crAttendedInvoiced = attendedOU > 0 ? (invoiced / attendedOU * 100) : 0;
        const crInvoicedPaid = invoiced > 0 ? (payments / invoiced * 100) : 0;
        const crThrough = newLeads > 0 ? (payments / newLeads * 100) : 0;

        return {
            newLeads, leadsWorked, qualLeads, scheduledOU, attendedOU, invoiced, payments, revenue,
            crLeadWorked, crWorkedQual, crLeadQual, crQualScheduled, crScheduledAttended, crAttendedPaid,
            crAttendedInvoiced, crInvoicedPaid, crThrough
        };
    }

    // ============================================================
    // FORMAT
    // ============================================================
    function fmtNum(n) { return n.toLocaleString('ru-RU'); }
    function fmtMoney(n) { return n.toLocaleString('ru-RU') + ' сум'; }
    function fmtPct(n) { return n.toFixed(1) + '%'; }

    function planStatus(pct) {
        if (pct >= 90) return { cls: 'green', label: 'В плане' };
        if (pct >= 70) return { cls: 'yellow', label: 'Риск' };
        return { cls: 'red', label: 'Отставание' };
    }

    // ============================================================
    // RENDER: STATISTICS
    // ============================================================
    function renderSummary() {
        const [from, to] = getDateRange(state.datePeriod, state.customFrom, state.customTo);
        const stats = computeStats(state.manager, from, to);

        // Combined funnel + CR grid (7 columns, 2 rows)
        // Row 1: funnel cards, Row 2: CR cards aligned below corresponding funnel card
        const funnelCards = [
            { label: 'Новых лидов', value: fmtNum(stats.newLeads), sub: 'всего', cls: 'fc-leads' },
            { label: 'Взято в работу', value: fmtNum(stats.leadsWorked), cls: 'fc-worked' },
            { label: 'Квал лидов', value: fmtNum(stats.qualLeads), cls: 'fc-qual' },
            { label: 'Записали на ОУ', value: fmtNum(stats.scheduledOU), cls: 'fc-scheduled' },
            { label: 'Пришли на ОУ', value: fmtNum(stats.attendedOU), cls: 'fc-attended' },
            { label: 'Оплат', value: fmtNum(stats.payments), cls: 'fc-paid' },
            { label: 'Выручка', value: fmtNum(stats.revenue), sub: 'сум', cls: 'fc-revenue' },
        ];

        // CR cards: index matches column (0=empty under "Новых лидов", 1=under "Взято", etc.)
        const crCards = [
            null, // no CR under "Новых лидов"
            { label: 'CR новый лид → взято', value: stats.crLeadWorked, color: 'clr-purple' },
            { label: 'CR взято → квал', value: stats.crWorkedQual, color: 'clr-green' },
            { label: 'CR квал → записали', value: stats.crQualScheduled, color: 'clr-green' },
            { label: 'CR записали → пришли', value: stats.crScheduledAttended, color: 'clr-yellow' },
            { label: 'CR пришли → оплатили', value: stats.crAttendedPaid, color: 'clr-orange' },
            { label: 'CR сквозная', value: stats.crThrough, color: 'clr-red' },
        ];

        let gridHtml = '';
        // Row 1: funnel cards
        funnelCards.forEach(c => {
            gridHtml += `<div class="funnel-card ${c.cls}">
                <div class="fc-label">${c.label}</div>
                <div class="fc-value">${c.value}</div>
                ${c.sub ? `<div class="fc-sub">${c.sub}</div>` : ''}
            </div>`;
        });
        // Row 2: CR cards
        crCards.forEach(c => {
            if (!c) {
                gridHtml += `<div></div>`;
            } else {
                gridHtml += `<div class="cr-card">
                    <div class="cr-label">${c.label}</div>
                    <div class="cr-value ${c.color}">${fmtPct(c.value)}</div>
                </div>`;
            }
        });

        document.getElementById('funnelGrid').innerHTML = gridHtml;
    }

    function crBadge(val) {
        const cls = val >= 60 ? 'bg-green' : val >= 40 ? 'bg-yellow' : 'bg-red';
        return `<span class="cr-badge ${cls}">${fmtPct(val)}</span>`;
    }

    function renderFunnel() {
        const [from, to] = getDateRange(state.datePeriod, state.customFrom, state.customTo);

        // Per-manager stats
        const mgrStats = MANAGERS.map(mgr => ({
            name: mgr,
            stats: computeStats(mgr, from, to)
        }));
        const totals = computeStats('all', from, to);

        const html = `
            <thead>
                <tr>
                    <th>Менеджер</th>
                    <th>Новых лидов</th>
                    <th>Квал лидов</th>
                    <th>CR взято→квал</th>
                    <th>Записали на ОУ</th>
                    <th>CR квал→запись</th>
                    <th>Пришли на ОУ</th>
                    <th>CR запись→приход</th>
                    <th>Оплат</th>
                    <th>CR приход→оплата</th>
                    <th>CR сквозная</th>
                    <th>Выручка</th>
                </tr>
            </thead>
            <tbody>
                ${mgrStats.map(m => `<tr>
                    <td>${m.name}</td>
                    <td>${fmtNum(m.stats.newLeads)}</td>
                    <td>${fmtNum(m.stats.qualLeads)}</td>
                    <td>${crBadge(m.stats.crWorkedQual)}</td>
                    <td>${fmtNum(m.stats.scheduledOU)}</td>
                    <td>${crBadge(m.stats.crQualScheduled)}</td>
                    <td>${fmtNum(m.stats.attendedOU)}</td>
                    <td>${crBadge(m.stats.crScheduledAttended)}</td>
                    <td>${fmtNum(m.stats.payments)}</td>
                    <td>${crBadge(m.stats.crAttendedPaid)}</td>
                    <td>${crBadge(m.stats.crThrough)}</td>
                    <td class="currency">${fmtMoney(m.stats.revenue)}</td>
                </tr>`).join('')}
                <tr class="mgr-total">
                    <td>ИТОГО</td>
                    <td>${fmtNum(totals.newLeads)}</td>
                    <td>${fmtNum(totals.qualLeads)}</td>
                    <td>${crBadge(totals.crWorkedQual)}</td>
                    <td>${fmtNum(totals.scheduledOU)}</td>
                    <td>${crBadge(totals.crQualScheduled)}</td>
                    <td>${fmtNum(totals.attendedOU)}</td>
                    <td>${crBadge(totals.crScheduledAttended)}</td>
                    <td>${fmtNum(totals.payments)}</td>
                    <td>${crBadge(totals.crAttendedPaid)}</td>
                    <td>${crBadge(totals.crThrough)}</td>
                    <td class="currency">${fmtMoney(totals.revenue)}</td>
                </tr>
            </tbody>
        `;

        document.getElementById('mgrDetailTable').innerHTML = html;
    }

    // ============================================================
    // RENDER: PLANS
    // ============================================================
    function getCurrentPlanYM() {
        return state.planMonth || getToday().getFullYear() + '-' + String(getToday().getMonth() + 1).padStart(2, '0');
    }

    function renderPlanEditor() {
        const ym = getCurrentPlanYM();
        const container = document.getElementById('planEditor');

        let html = '<table><thead><tr><th>Менеджер</th><th>Выручка план</th><th>Прошли ОУ план</th><th>KPI бонус</th><th></th></tr></thead><tbody>';

        MANAGERS.forEach(mgr => {
            const p = loadPlan(ym, mgr);
            html += `<tr data-manager="${mgr}">

        container.querySelectorAll('.plan-input').forEach(inp => {
            // Select all text on focus
            inp.addEventListener('focus', () => inp.select());
            // Live format with spaces while typing
            inp.addEventListener('input', () => {
                const raw = inp.value.replace(/\s/g, '').replace(/[^\d]/g, '');
                if (!raw) { inp.value = ''; return; }
                const num = parseInt(raw, 10);
                const cursor = inp.selectionStart;
                const oldLen = inp.value.length;
                inp.value = fmtNum(num);
                const newLen = inp.value.length;
                inp.setSelectionRange(cursor + (newLen - oldLen), cursor + (newLen - oldLen));
            });
            // Format on blur, clear if 0
            inp.addEventListener('blur', () => {
                const num = parseFloat(inp.value.replace(/\s/g, '')) || 0;
                inp.value = num ? fmtNum(num) : '';
            });
        });
    }

    let _trendChartPoints = [];
    const metricLabels = { spend: 'Бюджет', ctr: 'CTR', cpm: 'CPM', cpc: 'Цена клика', clicks: 'Кол-во кликов', leads: 'Заявки', cpl: 'Цена за заявку' };
    const metricSuffix = { spend: '$', ctr: '%', cpm: '$', cpc: '$', clicks: '', leads: '', cpl: '$' };

    function drawTrendChart(dailyData, metric) {
        const canvas = document.getElementById('metaTrendChart');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        canvas.width = canvas.offsetWidth * dpr;
        canvas.height = 220 * dpr;
        ctx.scale(dpr, dpr);
        const W = canvas.offsetWidth;
        const H = 220;
        ctx.clearRect(0, 0, W, H);
        _trendChartPoints = [];

        if (!dailyData || dailyData.length === 0) {
            ctx.fillStyle = '#8b8d97';
            ctx.font = '14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Нет данных', W / 2, H / 2);
            return;
        }

        // Extract values
        const values = dailyData.map(d => {
            const spend = parseFloat(d.spend || 0);
            const impr = parseInt(d.impressions || 0);
            const clicks = parseInt(d.clicks || 0);
            const leads = getMetaLeads(d.actions);
            if (metric === 'spend') return spend;
            if (metric === 'clicks') return clicks;
            if (metric === 'ctr') return impr > 0 ? (clicks / impr * 100) : 0;
            if (metric === 'cpm') return impr > 0 ? (spend / impr * 1000) : 0;
            if (metric === 'cpc') return clicks > 0 ? (spend / clicks) : 0;
            if (metric === 'leads') return leads;
            if (metric === 'cpl') return leads > 0 ? (spend / leads) : 0;
            return 0;
        });
        const labels = dailyData.map(d => {
            const parts = d.date_start.split('-');
            return parts[2] + '.' + parts[1];
        });

        const pad = { top: 20, right: 20, bottom: 35, left: 60 };
        const chartW = W - pad.left - pad.right;
        const chartH = H - pad.top - pad.bottom;

        const maxVal = Math.max(...values, 1);
        const minVal = Math.min(...values, 0);
        const range = maxVal - minVal || 1;

        // Grid lines
        ctx.strokeStyle = '#2a2d3a';
        ctx.lineWidth = 1;
        for (let i = 0; i <= 4; i++) {
            const y = pad.top + (chartH / 4) * i;
            ctx.beginPath();
            ctx.moveTo(pad.left, y);
            ctx.lineTo(W - pad.right, y);
            ctx.stroke();
            const val = maxVal - (range / 4) * i;
            ctx.fillStyle = '#8b8d97';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(val >= 1000 ? fmtNum(Math.round(val)) : val.toFixed(2), pad.left - 8, y + 4);
        }

        // X labels
        const step = Math.max(1, Math.floor(values.length / 10));
        ctx.fillStyle = '#8b8d97';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'center';
        values.forEach((v, i) => {
            if (i % step === 0 || i === values.length - 1) {
                const x = pad.left + (i / (values.length - 1 || 1)) * chartW;
                ctx.fillText(labels[i], x, H - 8);
            }
        });

        // Line + gradient fill
        const gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + chartH);
        gradient.addColorStop(0, 'rgba(99,102,241,0.3)');
        gradient.addColorStop(1, 'rgba(99,102,241,0)');

        ctx.beginPath();
        values.forEach((v, i) => {
            const x = pad.left + (i / (values.length - 1 || 1)) * chartW;
            const y = pad.top + chartH - ((v - minVal) / range) * chartH;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.strokeStyle = '#6366f1';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Fill under curve
        ctx.lineTo(pad.left + chartW, pad.top + chartH);
        ctx.lineTo(pad.left, pad.top + chartH);
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.fill();

        // Dots + store points for tooltip
        values.forEach((v, i) => {
            const x = pad.left + (i / (values.length - 1 || 1)) * chartW;
            const y = pad.top + chartH - ((v - minVal) / range) * chartH;
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#6366f1';
            ctx.fill();
            _trendChartPoints.push({ x, y, value: v, label: labels[i], metric });
        });
    }

    // Tooltip on hover
    (function() {
        const canvas = document.getElementById('metaTrendChart');
        const tooltip = document.getElementById('metaTrendTooltip');
        if (!canvas || !tooltip) return;

        canvas.addEventListener('mousemove', function(e) {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            let closest = null, minDist = Infinity;
            _trendChartPoints.forEach(p => {
                const dist = Math.hypot(p.x - mx, p.y - my);
                if (dist < minDist) { minDist = dist; closest = p; }
            });
            if (closest && minDist < 30) {
                const suffix = metricSuffix[closest.metric] || '';
                const name = metricLabels[closest.metric] || closest.metric;
                const valStr = suffix === '$'
                    ? '$' + (closest.value >= 1000 ? fmtNum(Math.round(closest.value)) : closest.value.toFixed(2))
                    : (closest.value >= 1000 ? fmtNum(Math.round(closest.value)) : closest.value.toFixed(2)) + suffix;
                tooltip.innerHTML = `<div style="color:#8b8d97;margin-bottom:2px">${closest.label}</div><div><b>${name}:</b> ${valStr}</div>`;
                tooltip.style.display = 'block';
                let tx = closest.x + 12;
                let ty = closest.y - 40;
                if (tx + 150 > canvas.offsetWidth) tx = closest.x - 150;
                if (ty < 0) ty = closest.y + 12;
                tooltip.style.left = tx + 'px';
                tooltip.style.top = ty + 'px';
            } else {
                tooltip.style.display = 'none';
            }
        });

        canvas.addEventListener('mouseleave', function() {
            tooltip.style.display = 'none';
        });
    })();

    // ============================================================
    // RECOMMENDATIONS ENGINE
    // ============================================================
    function generateRecommendations(rows) {
        const recs = [];
        if (!rows || rows.length < 2) {
            recs.push({ type: 'warn', text: 'Недостаточно данных для анализа. Выберите уровень кампаний, групп или креативов.' });
            return recs;
        }

        // Process all rows with computed metrics
        const items = rows.map(r => {
            const spend = parseFloat(r.spend || 0);
            const impr = parseInt(r.impressions || 0);
            const clicks = parseInt(r.clicks || 0);
            const leads = getMetaLeads(r.actions);
            const cpl = leads > 0 ? spend / leads : Infinity;
            const ctr = impr > 0 ? clicks / impr * 100 : 0;
            const cr = clicks > 0 ? leads / clicks * 100 : 0;
            const name = r.campaign_name || r.adset_name || r.ad_name || '—';
            return { name, spend, impr, clicks, leads, cpl, ctr, cr };
        }).filter(r => r.spend > 0);

        if (items.length === 0) return recs;

        // Average CPL
        const totalSpend = items.reduce((s, r) => s + r.spend, 0);
        const totalLeads = items.reduce((s, r) => s + r.leads, 0);
        const avgCPL = totalLeads > 0 ? totalSpend / totalLeads : 0;
        const avgCTR = items.reduce((s, r) => s + r.ctr, 0) / items.length;

        // Best performers (lowest CPL with leads > 0)
        const withLeads = items.filter(r => r.leads > 0).sort((a, b) => a.cpl - b.cpl);
        if (withLeads.length > 0) {
            const best = withLeads[0];
            recs.push({ type: 'good', text: `<strong>Лучший CPL:</strong> «${best.name}» — $${best.cpl.toFixed(2)} за лид (${best.leads} заявок). Рассмотрите увеличение бюджета на эту кампанию.` });
        }

        // Worst performers (highest CPL)
        if (withLeads.length > 1) {
            const worst = withLeads[withLeads.length - 1];
            if (worst.cpl > avgCPL * 1.5) {
                recs.push({ type: 'bad', text: `<strong>Дорогие лиды:</strong> «${worst.name}» — $${worst.cpl.toFixed(2)} за лид (в ${(worst.cpl / avgCPL).toFixed(1)}x дороже среднего). Рассмотрите оптимизацию или отключение.` });
            }
        }

        // High spend, no leads
        const noLeads = items.filter(r => r.leads === 0 && r.spend > totalSpend * 0.05);
        noLeads.forEach(r => {
            recs.push({ type: 'bad', text: `<strong>Без заявок:</strong> «${r.name}» потратила $${r.spend.toFixed(2)} без единой заявки. Рекомендуется остановить или переработать.` });
        });

        // Best CTR
        const bestCTR = [...items].sort((a, b) => b.ctr - a.ctr)[0];
        if (bestCTR && bestCTR.ctr > avgCTR * 1.3) {
            recs.push({ type: 'good', text: `<strong>Лучший CTR:</strong> «${bestCTR.name}» — ${bestCTR.ctr.toFixed(2)}% (среднее ${avgCTR.toFixed(2)}%). Креатив хорошо привлекает внимание.` });
        }

        // Low CTR
        const lowCTR = items.filter(r => r.ctr < avgCTR * 0.5 && r.spend > totalSpend * 0.1);
        lowCTR.forEach(r => {
            recs.push({ type: 'warn', text: `<strong>Низкий CTR:</strong> «${r.name}» — ${r.ctr.toFixed(2)}% (среднее ${avgCTR.toFixed(2)}%). Попробуйте обновить креатив или текст объявления.` });
        });

        // Best conversion rate
        const bestCR = [...items].filter(r => r.clicks > 10).sort((a, b) => b.cr - a.cr)[0];
        if (bestCR && bestCR.cr > 0) {
            recs.push({ type: 'good', text: `<strong>Лучшая конверсия:</strong> «${bestCR.name}» — ${bestCR.cr.toFixed(2)}% из кликов в заявки. Эффективная связка аудитории и оффера.` });
        }

        // General summary
        if (totalLeads > 0) {
            recs.push({ type: 'warn', text: `<strong>Общая статистика:</strong> Средняя цена лида $${avgCPL.toFixed(2)}, средний CTR ${avgCTR.toFixed(2)}%. Всего ${totalLeads} заявок за $${totalSpend.toFixed(2)}.` });
        }

        return recs;
    }

    // ============================================================
    // RENDER MARKETING (main function)
    // ============================================================
    async function renderMarketing() {
        const container = document.getElementById('metaSummaryCards');
        container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--text-dim)">Загрузка данных Meta Ads...</div>';

        // Always load campaign-level data for filtering excluded campaigns from totals
        const [rows, dailyData, campaignRows] = await Promise.all([
            loadMetaInsights(),
            loadMetaDailyInsights(),
            metaState.level === 'account' ? loadMetaInsightsAtLevel('campaign') : Promise.resolve(null)
        ]);
        _lastDailyData = dailyData;

        // Filter excluded campaigns from display rows (campaign/adset/ad levels)
        const filteredRows = metaState.level !== 'account' ? filterExcludedCampaigns(rows) : rows;

        if (!filteredRows || filteredRows.length === 0) {
            container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--text-dim)">Нет данных за выбранный период</div>';
            document.getElementById('metaDetailTable').innerHTML = '';
            document.getElementById('metaRecommendations').innerHTML = '';
            drawTrendChart([], 'spend');
            return;
        }

        // Calculate totals — always exclude МОП campaigns
        const totalsSource = campaignRows ? filterExcludedCampaigns(campaignRows) : filteredRows;
        let totalSpend = 0, totalImpressions = 0, totalClicks = 0, totalLeads = 0;
        totalsSource.forEach(r => {
            totalSpend += parseFloat(r.spend || 0);
            totalImpressions += parseInt(r.impressions || 0);
            totalClicks += parseInt(r.clicks || 0);
            totalLeads += getMetaLeads(r.actions);
        });

        const totalCPM = totalImpressions > 0 ? (totalSpend / totalImpressions * 1000) : 0;
        const totalCTR = totalImpressions > 0 ? (totalClicks / totalImpressions * 100) : 0;
        const totalCPC = totalClicks > 0 ? (totalSpend / totalClicks) : 0;
        const totalCR = totalClicks > 0 ? (totalLeads / totalClicks * 100) : 0;
        const totalCPL = totalLeads > 0 ? (totalSpend / totalLeads) : 0;

        // Summary cards
        const summaryCards = [
            { label: 'Бюджет', value: '$' + totalSpend.toFixed(2), cls: 'fc-leads' },
            { label: 'CPM', value: '$' + totalCPM.toFixed(2), cls: 'fc-worked' },
            { label: 'CTR', value: totalCTR.toFixed(2) + '%', cls: 'fc-qual' },
            { label: 'Кликов', value: fmtNum(totalClicks), cls: 'fc-scheduled' },
            { label: 'Цена клика', value: '$' + totalCPC.toFixed(2), cls: 'fc-attended' },
            { label: 'Заявок', value: fmtNum(totalLeads), cls: 'fc-paid' },
            { label: 'CR', value: totalCR.toFixed(2) + '%', cls: 'fc-revenue' },
            { label: 'Цена лида', value: '$' + totalCPL.toFixed(2), cls: 'fc-leads' },
        ];

        container.innerHTML = summaryCards.map(c => `
            <div class="funnel-card ${c.cls}">
                <div class="fc-label">${c.label}</div>
                <div class="fc-value" style="font-size:${c.value.length > 10 ? '18' : '24'}px">${c.value}</div>
            </div>
        `).join('');

        // Draw trends chart
        const selectedMetric = document.getElementById('metaTrendMetric').value;
        drawTrendChart(dailyData, selectedMetric);

        // Recommendations (use filtered rows)
        const recs = generateRecommendations(filteredRows);
        const recContainer = document.getElementById('metaRecommendations');
        recContainer.innerHTML = recs.length === 0
            ? '<div style="color:var(--text-dim);padding:8px">Нет рекомендаций</div>'
            : recs.map(r => `<div class="rec-item ${r.type === 'good' ? 'rec-good' : r.type === 'bad' ? 'rec-bad' : 'rec-warn'}">${r.text}</div>`).join('');

        // Detail table
        const detailTable = document.getElementById('metaDetailTable');
        if (metaState.level === 'account') { detailTable.innerHTML = ''; return; }

        // Process rows for table + sorting (use filtered rows)
        metaProcessedRows = filteredRows.map(r => {
            const spend = parseFloat(r.spend || 0);
            const impressions = parseInt(r.impressions || 0);
            const clicks = parseInt(r.clicks || 0);
            const leads = getMetaLeads(r.actions);
            return {
                campaign_name: r.campaign_name || '—', adset_name: r.adset_name || '—', ad_name: r.ad_name || '—',
                spend, impressions, clicks, leads,
                cpm: impressions > 0 ? (spend / impressions * 1000) : 0,
                ctr: impressions > 0 ? (clicks / impressions * 100) : 0,
                cpc: clicks > 0 ? (spend / clicks) : 0,
                cr: clicks > 0 ? (leads / clicks * 100) : 0,
                cpl: leads > 0 ? (spend / leads) : 0,
            };
        });

        metaSortCol = 'spend';
        metaSortDir = 'desc';
        renderMetaTable();
    }

    function renderMetaTable() {
        const detailTable = document.getElementById('metaDetailTable');
        // Sort
        const sorted = [...metaProcessedRows].sort((a, b) => {
            let va = a[metaSortCol], vb = b[metaSortCol];
            if (typeof va === 'string') va = va.toLowerCase();
            if (typeof vb === 'string') vb = vb.toLowerCase();
            if (metaSortDir === 'asc') return va > vb ? 1 : va < vb ? -1 : 0;
            return va < vb ? 1 : va > vb ? -1 : 0;
        });

        // Build sortable headers
        function th(label, col) {
            const arrow = metaSortCol === col ? (metaSortDir === 'asc' ? '▲' : '▼') : '▲';
            const active = metaSortCol === col ? ' sort-active' : '';
            return `<th class="sortable-th${active}" data-sort="${col}">${label}<span class="sort-arrow">${arrow}</span></th>`;
        }

        let extraHeaders = '';
        if (metaState.level === 'adset') {
            extraHeaders = th('Кампания','campaign_name') + th('Группа','adset_name');
        } else if (metaState.level === 'ad') {
            extraHeaders = th('Кампания','campaign_name') + th('Группа','adset_name') + th('Креатив','ad_name');
        } else {
            extraHeaders = th('Кампания','campaign_name');
        }

        let html = `<thead><tr>
            ${extraHeaders}
            ${th('Бюджет','spend')}
            ${th('CPM','cpm')}
            ${th('CTR','ctr')}
            ${th('Кликов','clicks')}
            ${th('Цена клика','cpc')}
            ${th('Заявок','leads')}
            ${th('CR','cr')}
            ${th('Цена лида','cpl')}
        </tr></thead><tbody>`;

        sorted.forEach(r => {
            let nameCells = '';
            if (metaState.level === 'adset') {
                nameCells = `<td>${r.campaign_name}</td><td><strong>${r.adset_name}</strong></td>`;
            } else if (metaState.level === 'ad') {
                nameCells = `<td>${r.campaign_name}</td><td>${r.adset_name}</td><td><strong>${r.ad_name}</strong></td>`;
            } else {
                nameCells = `<td><strong>${r.campaign_name}</strong></td>`;
            }

            html += `<tr>
                ${nameCells}
                <td>$${r.spend.toFixed(2)}</td>
                <td>$${r.cpm.toFixed(2)}</td>
                <td>${r.ctr.toFixed(2)}%</td>
                <td>${fmtNum(r.clicks)}</td>
                <td>$${r.cpc.toFixed(2)}</td>
                <td>${fmtNum(r.leads)}</td>
                <td>${r.cr.toFixed(2)}%</td>
                <td>${r.cpl === Infinity ? '—' : '$' + r.cpl.toFixed(2)}</td>
            </tr>`;
        });

        html += '</tbody>';
        detailTable.innerHTML = html;

        // Attach sort handlers
        detailTable.querySelectorAll('.sortable-th').forEach(header => {
            header.addEventListener('click', () => {
                const col = header.dataset.sort;
                if (metaSortCol === col) {
                    metaSortDir = metaSortDir === 'asc' ? 'desc' : 'asc';
                } else {
                    metaSortCol = col;
                    metaSortDir = (col === 'campaign_name' || col === 'adset_name' || col === 'ad_name') ? 'asc' : 'desc';
                }
                renderMetaTable();
            });
        });
    }

    // Department tabs
    document.querySelectorAll('.dept-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.dept-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const dept = btn.dataset.dept;

            const salesContent = document.getElementById('dept-sales');
            const marketingContent = document.getElementById('dept-marketing');

            if (dept === 'sales') {
                salesContent.style.display = '';
                marketingContent.style.display = 'none';
            } else {
                salesContent.style.display = 'none';
                marketingContent.style.display = '';
                renderMarketing();
            }
        });
    });

    // Meta date filter buttons
    document.querySelectorAll('#metaDateFilters .filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#metaDateFilters .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            metaState.datePeriod = btn.dataset.period;

            if (metaState.datePeriod === 'custom') {
                document.getElementById('metaCustomDates').style.display = 'flex';
            } else {
                document.getElementById('metaCustomDates').style.display = 'none';
                renderMarketing();
            }
        });
    });

    window.applyMetaCustomDates = function() {
        metaState.customFrom = document.getElementById('metaDateFrom').value;
        metaState.customTo = document.getElementById('metaDateTo').value;
        if (metaState.customFrom && metaState.customTo) {
            renderMarketing();
        }
    };

    // Meta level filter buttons
    document.querySelectorAll('#metaLevelFilters .filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#metaLevelFilters .filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            metaState.level = btn.dataset.level;
            renderMarketing();
        });
    });

    // Trend metric selector — redraw chart without full reload
    let _lastDailyData = [];
    document.getElementById('metaTrendMetric').addEventListener('change', async () => {
        const metric = document.getElementById('metaTrendMetric').value;
        if (!_lastDailyData.length) _lastDailyData = await loadMetaDailyInsights();
        drawTrendChart(_lastDailyData, metric);
    });

    // ============================================================
    // INIT
    // ============================================================
    async function init() {
        // Show loading state
        document.getElementById('funnelGrid').innerHTML = '<div class="funnel-card" style="grid-column:1/-1"><div class="fc-label">Загрузка данных из Google Sheets...</div><div class="loading-bar"></div></div>';

        const now = new Date();
        document.getElementById('currentDate').textContent = now.toLocaleDateString('ru-RU', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        // Load data from Google Sheets
        try {
            await loadDeals();
        } catch (e) {
            document.getElementById('funnelGrid').innerHTML = '<div class="funnel-card" style="grid-column:1/-1"><div class="fc-label" style="color:var(--red)">Ошибка загрузки: ' + e.message + '</div></div>';
            console.error(e);
            return;
        }

        // Populate manager filters dynamically
        const mgrOpts = MANAGERS.map(m => `<option value="${m}">${m}</option>`).join('');
        document.getElementById('managerFilter').innerHTML = '<option value="all">Весь отдел</option>' + mgrOpts;
        document.getElementById('planManagerFilter').innerHTML = '<option value="all">Весь отдел</option>' + mgrOpts;

        // Populate plan month filter (last 6 months + next month)
        const planMonthSelect = document.getElementById('planMonthFilter');
        const monthNames = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
        for (let i = -1; i < 6; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const val = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
            const opt = document.createElement('option');
            opt.value = val;
            opt.textContent = monthNames[d.getMonth()] + ' ' + d.getFullYear();
            if (i === 0) { opt.selected = true; state.planMonth = val; }
            planMonthSelect.appendChild(opt);
        }

        // Populate salary months (last 6 months)
        const salaryMonthSelect = document.getElementById('salaryMonth');
        for (let i = 0; i < 6; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const opt = document.createElement('option');
            opt.value = d.getFullYear() + '-' + d.getMonth();
            opt.textContent = monthNames[d.getMonth()] + ' ' + d.getFullYear();
            if (i === 0) opt.selected = true;
            salaryMonthSelect.appendChild(opt);
        }

        // Determine salary period based on current date
        const currentDay = now.getDate();
        state.salaryPeriod = currentDay <= 15 ? 'first' : 'second';
        document.querySelectorAll('#salaryPeriodFilters .filter-btn').forEach(b => {
            b.classList.remove('active');
            if (b.dataset.period === state.salaryPeriod) b.classList.add('active');
        });

        // Set default dates for custom period
        document.getElementById('dateFrom').value = fmt(new Date(now.getFullYear(), now.getMonth(), 1));
        document.getElementById('dateTo').value = fmt(now);

        renderAll();
        console.log(`Загружено ${ALL_DEALS.length} сделок, ${MANAGERS.length} менеджеров: ${MANAGERS.join(', ')}`);
    }

    init();
    </script>
